<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      height: 300px;
      background: #0F1318;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0,155,164,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-glow {
      position: absolute;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(0,155,164,0.25) 0%, transparent 70%);
      filter: blur(12px);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-box {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 24px;
      border: 1px solid rgba(0,155,164,0.40);
      background: linear-gradient(135deg, rgba(0,155,164,0.20), rgba(0,155,164,0.08));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px rgba(0,155,164,0.10), 0 12px 32px rgba(0,155,164,0.20);
    }

    .logo-box img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #E8EDF2;
      line-height: 1;
    }

    .subtitle {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(0,155,164,0.75);
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,155,164,0.15);
      border-top-color: rgba(0,155,164,0.80);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-box">
      <img src="../public/logo.png" alt="PRISM" />
    </div>
  </div>

  <div class="text">
    <div class="title">PRISM</div>
    <div class="subtitle">Launcher</div>
  </div>

  <div class="spinner"></div>
</body>
</html>
