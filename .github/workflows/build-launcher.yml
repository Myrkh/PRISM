name: Build PRISM Launcher

on:
  push:
    tags:
      - 'launcher-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fix Python distutils (Python 3.12 supprime distutils, requis par node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        working-directory: launcher
        run: npm install

      - name: Rebuild native modules for Electron
        working-directory: launcher
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build & package
        working-directory: launcher
        run: npm run dist -- --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PRISM-Launcher-Windows
          path: launcher/release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/release/*.exe
          name: PRISM Launcher ${{ github.ref_name }}
